# Bonding outcome (D-03 / D-03b, ROADMAP criterion 3) — see FINDINGS_5.md section 3
bond_outcome: "confirmed-write trick is iOS-only; macOS CoreBluetooth does NOT auto-bond. bond_5.py (fresh-state) produced: client.pair() -> NotImplementedError (expected on macOS); start_notify(cmd-resp) -> CBATTErrorDomain Code=15 'Encryption is insufficient'; write_gatt_char(cmd-in, response=True) -> 'Insufficient Authentication'; no macOS pairing dialog. D-03b fallback (PacketLogger SMP capture from the official app) required for the SMP-visible evidence on ROADMAP criterion 3."

# Standard HR + battery confirmation (D-03, ROADMAP criterion 4) — see FINDINGS_5.md §4
hr_battery_confirmed: "yes — hr_5.py (strap worn, 2026-05-30): battery 23%; 12 HR notifications over 12s -> HR=71 bpm (10x), HR=72 bpm (2x). Standard characteristics readable WITHOUT bonding."


notes: "Phase 2 GATT survey closes the Phase 1 handle->UUID loop and resolves RESEARCH assumptions A1 (cmd-in/resp/data UUID offsets) and A2 (legacy UUID absent). No raw device identifiers (serial, MAC, CoreBluetooth UUID, device name) committed in this sidecar or in FINDINGS_5.md — device identity is [REDACTED]. No SMP pairing-key material is present: the confirmed-write trick did not trigger SMP on macOS, so no SMP capture or pairing-key bytes were produced in this wave (D-03b fallback documented for the developer per re/capture/ios-packetlogger.md + scrub policy in DISCLAIMER section 2)."
